# MCP Knowledge Hub - Nginx Reverse Proxy (HTTP + HTTPS)
# Certificados: Let's Encrypt vía certbot en Docker; fallback autofirmado si no existen
# SNI: mcp.domoticore.co (gateway + webapp), auth.domoticore.co (Keycloak + DCR proxy)

events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format mcp '$remote_addr - $host [$time_local] "$request" $status '
                   'ua="$http_user_agent" ref="$http_referer"';
    access_log /dev/stdout mcp;
    error_log  /dev/stderr info;

    # Puerto 80: redirigir todo a HTTPS salvo ACME (certbot)
    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /.well-known/acme-challenge/ {
            alias /var/www/certbot/.well-known/acme-challenge/;
        }

        location / {
            return 302 https://$host$request_uri;
        }
    }

    # HTTPS: mcp.domoticore.co → gateway + webapp
    server {
        listen 443 ssl;
        server_name mcp.domoticore.co;

        ssl_certificate     /etc/letsencrypt/live/mcp.domoticore.co-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mcp.domoticore.co-0001/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # PRM root: ChatGPT espera GET https://mcp.domoticore.co/.well-known/oauth-protected-resource (resource = host)
        location = /.well-known/oauth-protected-resource {
            proxy_pass http://gateway:3001/.well-known/oauth-protected-resource;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OIDC discovery en el host MCP (workaround: connector puede pedirlo aquí)
        location = /.well-known/openid-configuration {
            proxy_pass http://keycloak:8080/realms/mcp/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host auth.domoticore.co;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host auth.domoticore.co;
            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
        }

        # OAuth AS metadata (algunos clientes lo piden; Keycloak lo sirve vía openid-configuration)
        location = /.well-known/oauth-authorization-server {
            proxy_pass http://keycloak:8080/realms/mcp/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host auth.domoticore.co;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host auth.domoticore.co;
            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
        }

        # ChatGPT (aiohttp) pide discovery con sufijo /api/mcp; devolver mismo JSON que la raíz
        location = /.well-known/oauth-authorization-server/api/mcp {
            proxy_pass http://keycloak:8080/realms/mcp/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host auth.domoticore.co;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host auth.domoticore.co;
            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
        }
        location = /.well-known/openid-configuration/api/mcp {
            proxy_pass http://keycloak:8080/realms/mcp/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host auth.domoticore.co;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host auth.domoticore.co;
            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
        }
        location = /api/mcp/.well-known/oauth-authorization-server {
            proxy_pass http://keycloak:8080/realms/mcp/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host auth.domoticore.co;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host auth.domoticore.co;
            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
        }
        location = /api/mcp/.well-known/openid-configuration {
            proxy_pass http://keycloak:8080/realms/mcp/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host auth.domoticore.co;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host auth.domoticore.co;
            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
        }

        # RFC 9728: para recurso https://mcp.domoticore.co/api/mcp la metadata está en
        # https://mcp.domoticore.co/.well-known/oauth-protected-resource/api/mcp (no bajo /api/mcp/)
        location = /.well-known/oauth-protected-resource/api/mcp {
            proxy_pass http://gateway:3001/.well-known/oauth-protected-resource;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-MCP-Resource-URL https://mcp.domoticore.co/api/mcp;
        }

        location = /api/mcp/.well-known/oauth-protected-resource {
            proxy_pass http://gateway:3001/.well-known/oauth-protected-resource;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-MCP-Resource-URL https://mcp.domoticore.co/api/mcp;
        }

        location /api/ {
            set $gateway_upstream gateway;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$gateway_upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_next_upstream error timeout;
        }

        location / {
            set $webapp_upstream webapp;
            proxy_pass http://$webapp_upstream:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS: auth.domoticore.co → Keycloak + DCR proxy al gateway
    # Si certbot crea auth.domoticore.co-0001, usar live/auth.domoticore.co-0001/ en las rutas ssl_*
    server {
        listen 443 ssl;
        server_name auth.domoticore.co;

        ssl_certificate     /etc/letsencrypt/live/auth.domoticore.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.domoticore.co/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # DCR + Registration Client URI (POST y GET/PUT/DELETE con client_id)
        location ^~ /realms/mcp/clients-registrations/openid-connect {
            proxy_pass http://gateway:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass http://keycloak:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
