# MCP Knowledge Hub - Nginx Reverse Proxy (HTTP + HTTPS)
# Certificados: Let's Encrypt vía certbot en Docker; fallback autofirmado si no existen

events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Puerto 80: redirigir todo a HTTPS salvo ACME (certbot)
    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /.well-known/acme-challenge/ {
            alias /var/www/certbot/;
        }

        # Todo lo demás → HTTPS (Route 53 apunta a esta IP; el tráfico termina en HTTPS)
        location / {
            return 302 https://$host$request_uri;
        }
    }

    # HTTPS (443): mismo proxy que 80; certificados en /etc/letsencrypt (certbot o autofirmado)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/mcp.domoticore.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mcp.domoticore.co/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /api/ {
            set $gateway_upstream gateway;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$gateway_upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_next_upstream error timeout;
        }

        location / {
            set $webapp_upstream webapp;
            proxy_pass http://$webapp_upstream:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
